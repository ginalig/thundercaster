<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Thundercaster Field</title>
        <style>
            :root {
                color-scheme: dark;
                --bg: #0f1115;
                --panel: #14171c;
                --line: #2a3038;
                --text: #f3f4f6;
                --muted: #9ca3af;
                --accent: #ffffff;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 16px;
                font-family: "Helvetica Neue", Arial, sans-serif;
                color: var(--text);
                background: var(--bg);
            }

            .app {
                width: min(92vw, 560px);
            }

            .toolbar {
                display: flex;
                gap: 10px;
                align-items: center;
                flex-wrap: wrap;
                margin-bottom: 12px;
            }

            button {
                appearance: none;
                border: 1px solid var(--line);
                border-radius: 999px;
                padding: 10px 14px;
                font: inherit;
                font-weight: 600;
                color: var(--text);
                background: transparent;
                cursor: pointer;
                transition: opacity 140ms ease, border-color 140ms ease;
            }

            button:hover {
                border-color: var(--accent);
            }

            button:disabled {
                cursor: not-allowed;
                opacity: 0.55;
            }

            .status {
                flex: 1 1 180px;
                min-height: 20px;
                color: var(--muted);
                font-size: 0.82rem;
            }

            .stage-wrap {
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 0 12px;
            }

            .stage {
                position: relative;
                width: min(82vw, 420px);
                height: min(82vw, 420px);
                max-width: 420px;
                max-height: 420px;
                min-width: 240px;
                min-height: 240px;
                border-radius: 8px;
                border: 1px solid var(--line);
                background: #111418;
                overflow: hidden;
                cursor: crosshair;
            }

            .stage::before,
            .stage::after {
                content: "";
                position: absolute;
                background: var(--line);
            }

            .stage::before {
                top: 50%;
                left: 0;
                width: 100%;
                height: 1px;
            }

            .stage::after {
                left: 50%;
                top: 0;
                width: 1px;
                height: 100%;
            }

            .listener,
            .source {
                position: absolute;
                width: 10px;
                height: 10px;
                border-radius: 999px;
                transform: translate(-50%, -50%);
            }

            .listener {
                left: 50%;
                top: 50%;
                background: var(--accent);
            }

            .source {
                left: 50%;
                top: 50%;
                background: #6b7280;
                opacity: 0;
                transition: left 120ms ease, top 120ms ease, opacity 120ms ease;
            }

            .source.active {
                opacity: 1;
            }

            .controls {
                display: grid;
                gap: 10px;
            }

            .readout {
                display: flex;
                gap: 12px;
                align-items: center;
                flex-wrap: wrap;
                color: var(--muted);
                font-size: 0.82rem;
            }

            .readout span:last-child {
                margin-left: auto;
            }

            .volume {
                display: flex;
                align-items: center;
                gap: 12px;
                color: var(--muted);
                font-size: 0.82rem;
            }

            #volume {
                flex: 1 1 auto;
                width: 100%;
                accent-color: #d1d5db;
            }

            @media (max-width: 560px) {
                .readout span:last-child {
                    margin-left: 0;
                }
            }
        </style>
    </head>
    <body>
        <main class="app">
            <div class="toolbar">
                <button id="start" disabled>Start audio</button>
                <div id="status" class="status">Loading generated patch assets...</div>
            </div>

            <div class="stage-wrap">
                <div id="stage" class="stage" aria-label="Thunder field">
                    <div class="listener" aria-hidden="true"></div>
                    <div id="source" class="source" aria-hidden="true"></div>
                </div>
            </div>

            <section class="controls">
                <div class="readout">
                    <span id="distanceValue">1</span>
                    <span id="panValue">0.5</span>
                </div>
                <div class="volume">
                    <label for="volume">vol</label>
                    <input id="volume" type="range" min="0" max="1" step="0.01" value="0.7">
                    <span id="volumeValue">0.70</span>
                </div>
            </section>
        </main>

        <script src="./webpd-runtime.js"></script>
        <script>
            const PATCH_URL = './patch.wasm'
            const DEFAULT_PORTLET_ID = '0'

            const startButton = document.querySelector('#start')
            const statusDiv = document.querySelector('#status')
            const stage = document.querySelector('#stage')
            const sourceDot = document.querySelector('#source')
            const distanceValue = document.querySelector('#distanceValue')
            const panValue = document.querySelector('#panValue')
            const volumeSlider = document.querySelector('#volume')
            const volumeValue = document.querySelector('#volumeValue')

            const audioContext = new AudioContext()

            let patch = null
            let webpdNode = null
            let controlNodeIds = null

            const setStatus = (text) => {
                statusDiv.textContent = text
            }

            const sendMsgToWebPd = (nodeId, message) => {
                if (!webpdNode || !nodeId) {
                    return
                }

                webpdNode.port.postMessage({
                    type: 'io:messageReceiver',
                    payload: {
                        nodeId,
                        portletId: DEFAULT_PORTLET_ID,
                        message,
                    },
                })
            }

            const findNodeIdByLabel = (metadata, targetLabel) => {
                const patchNodes = metadata?.customMetadata?.pdNodes || {}
                for (const patchId of Object.keys(patchNodes)) {
                    const nodes = patchNodes[patchId]
                    for (const pdNodeId of Object.keys(nodes)) {
                        const node = nodes[pdNodeId]
                        if (node?.layout?.label === targetLabel) {
                            return `n_${patchId}_${pdNodeId}`
                        }
                    }
                }
                return null
            }

            const findPlayNodeId = (metadata) => {
                const patchNodes = metadata?.customMetadata?.pdNodes || {}
                for (const patchId of Object.keys(patchNodes)) {
                    const nodes = patchNodes[patchId]
                    for (const pdNodeId of Object.keys(nodes)) {
                        const node = nodes[pdNodeId]
                        if (node?.type === 'bng' && node?.layout?.label === 'play') {
                            return `n_${patchId}_${pdNodeId}`
                        }
                    }
                }
                return null
            }

            const receiveMsgFromWebPd = (nodeId, portletId, message) => {
                if (portletId !== DEFAULT_PORTLET_ID || !controlNodeIds) {
                    return
                }

                const value = message.at(-1)
                if (typeof value !== 'number' || Number.isNaN(value)) {
                    return
                }

                if (nodeId === controlNodeIds.generalDistance) {
                    distanceValue.textContent = Math.round(value).toString()
                }

                if (nodeId === controlNodeIds.outPan) {
                    panValue.textContent = value.toFixed(3)
                }

                if (nodeId === controlNodeIds.generalVolume) {
                    volumeSlider.value = String(value)
                    volumeValue.textContent = value.toFixed(2)
                }
            }

            const applyVolume = () => {
                const value = Number(volumeSlider.value)
                volumeValue.textContent = value.toFixed(2)
                if (controlNodeIds?.generalVolume) {
                    sendMsgToWebPd(controlNodeIds.generalVolume, [value])
                }
            }

            const initApp = async () => {
                await WebPdRuntime.initialize(audioContext)

                const response = await fetch(PATCH_URL)
                patch = await response.arrayBuffer()

                const metadata = await WebPdRuntime.readMetadata(patch)
                controlNodeIds = {
                    play: findPlayNodeId(metadata),
                    generalDistance: findNodeIdByLabel(metadata, 'general_distance'),
                    outPan: findNodeIdByLabel(metadata, 'out_pan'),
                    generalVolume: findNodeIdByLabel(metadata, 'general_volume'),
                }

                if (!controlNodeIds.play || !controlNodeIds.generalDistance || !controlNodeIds.outPan || !controlNodeIds.generalVolume) {
                    throw new Error('The generated patch is missing one or more required controls.')
                }

                startButton.disabled = false
                setStatus('Patch loaded. Start audio, then click inside the box.')
                applyVolume()
            }

            const startApp = async () => {
                if (audioContext.state === 'suspended') {
                    await audioContext.resume()
                }

                if (!webpdNode) {
                    webpdNode = await WebPdRuntime.run(
                        audioContext,
                        patch,
                        WebPdRuntime.defaultSettingsForRun(PATCH_URL, receiveMsgFromWebPd),
                    )
                    webpdNode.connect(audioContext.destination)
                }

                applyVolume()
                startButton.disabled = true
                setStatus('Audio started. Click inside the field to trigger thunder.')
            }

            const calculateInteraction = (event) => {
                const rect = stage.getBoundingClientRect()
                const x = event.clientX - rect.left
                const y = event.clientY - rect.top
                const centerX = rect.width / 2
                const centerY = rect.height / 2
                const dx = x - centerX
                const dy = y - centerY
                const maxDistance = Math.hypot(centerX, centerY)
                const distanceRatio = Math.min(1, Math.hypot(dx, dy) / maxDistance)

                const distance = Math.round(1 + distanceRatio * 999)
                const pan = Math.max(0, Math.min(1, x / rect.width))

                return {
                    x,
                    y,
                    distance,
                    pan,
                }
            }

            const triggerFromStage = async (event) => {
                if (!webpdNode) {
                    setStatus('Start audio first.')
                    return
                }

                if (audioContext.state === 'suspended') {
                    await audioContext.resume()
                }

                const result = calculateInteraction(event)

                sourceDot.style.left = `${result.x}px`
                sourceDot.style.top = `${result.y}px`
                sourceDot.classList.add('active')

                distanceValue.textContent = String(result.distance)
                panValue.textContent = result.pan.toFixed(3)

                sendMsgToWebPd(controlNodeIds.generalDistance, [result.distance])
                sendMsgToWebPd(controlNodeIds.outPan, [result.pan])
                applyVolume()
                sendMsgToWebPd(controlNodeIds.play, ['bang'])

                setStatus(`Triggered thunder at distance ${result.distance} and pan ${result.pan.toFixed(3)}.`)
            }

            startButton.addEventListener('click', () => {
                startApp().catch((error) => {
                    console.error(error)
                    setStatus(`Could not start audio: ${error.message}`)
                })
            })

            stage.addEventListener('click', (event) => {
                triggerFromStage(event).catch((error) => {
                    console.error(error)
                    setStatus(`Could not trigger thunder: ${error.message}`)
                })
            })

            volumeSlider.addEventListener('input', applyVolume)
            volumeSlider.addEventListener('change', applyVolume)

            initApp().catch((error) => {
                console.error(error)
                setStatus(`Initialization failed: ${error.message}`)
            })
        </script>
    </body>
</html>
